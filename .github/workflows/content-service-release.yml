name: content-service release

on:
  push:
    branches: [main]
    paths:
      - 'content-service/**'
      - 'common/**'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'content-service-v')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    concurrency:
      group: deploy-manifest-update
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "beka birhanu"
          git config user.email "beka.b.atomsa@gmail.com"

      - name: Get or bump version
        id: bump
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            NEXT="${TAG#content-service-v}"
          else
            git fetch --tags
            LATEST=$(git tag | grep "^content-service-v0\.0\." | sort -t. -k3 -n | tail -1)
            if [ -z "$LATEST" ]; then
              X=0
            else
              X=$(echo "$LATEST" | sed 's/content-service-v0\.0\.//')
            fi
            NEXT="0.0.$((X+1))"
            git tag "content-service-v${NEXT}"
            git push origin "content-service-v${NEXT}"
          fi
          echo "version=$NEXT" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: content-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/content-service:v${{ steps.bump.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/content-service:latest

      - name: Update deployment image tag
        run: |
          VERSION="v${{ steps.bump.outputs.version }}"
          git checkout main
          git pull --rebase origin main
          sed -i "s|image: .*/content-service:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/content-service:${VERSION}|" \
            infra/content-service/deployment.yaml
          git add infra/content-service/deployment.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): bump content-service to ${VERSION} [skip ci]"
          git push origin HEAD:main
