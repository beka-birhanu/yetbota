syntax = "proto3";

package ai.v1;

option go_package = "/aipb/v1";

message DuplicateCandidate {
  string source_id = 1;
  float score = 2;
  string reason = 3;
}

message FindCandidatesRequest {
  string collection = 1;

  // minimal location payload for Phase 1 (expand later)
  string source_id = 2;
  string name = 3;
  string description = 4;
  string category = 5;

  // optional geo hooks (Phase 3+ can enforce)
  double lat = 6;
  double lng = 7;

  int32 limit = 8;
}

message FindCandidatesResponse {
  string code = 1;
  bool success = 2;
  string message = 3;
  repeated DuplicateCandidate candidates = 4;
}

service DuplicateService {
  rpc FindCandidates(FindCandidatesRequest) returns (FindCandidatesResponse);
}