syntax = "proto3";

package ai.v1;

import "ai/v1/embedding.proto";

option go_package = "/aipb/v1";

message Chunk {
  string source_id = 1;
  string text = 2;
  map<string, string> metadata = 3;
  int32 segment_idx = 4;
}

message UpsertChunksRequest {
  string collection = 1;
  repeated Chunk chunks = 2;
  repeated Vector embeddings = 3; // must match chunks length
}

message UpsertChunksResponse {
  string code = 1;
  bool success = 2;
  string message = 3;
}

message SearchRequest {
  string collection = 1;
  Vector query_embedding = 2;
  int32 limit = 3;
}

message ScoredChunk {
  Chunk chunk = 1;
  float score = 2;
}

message SearchResponse {
  string code = 1;
  bool success = 2;
  string message = 3;
  repeated ScoredChunk results = 4;
}

service VectorService {
  rpc UpsertChunks(UpsertChunksRequest) returns (UpsertChunksResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
}