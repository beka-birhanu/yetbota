services:
  redis:
    image: redis:7.4
    container_name: yetbota-redis
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${redisPassword}",
      ]
    ports:
      - "${redisPort}:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${redisPassword}

  db:
    image: postgres:13
    container_name: yetbota-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${postgresUser} -d ${postgresDB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${postgresPort}:5432"
    environment:
      POSTGRES_USER: ${postgresUser}
      POSTGRES_PASSWORD: ${postgresPassword}
      POSTGRES_DB: ${postgresDB}

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
