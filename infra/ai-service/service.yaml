apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: yetbota
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/part-of: yetbota
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-service
  ports:
    - name: rest
      port: 8080
      targetPort: rest
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
