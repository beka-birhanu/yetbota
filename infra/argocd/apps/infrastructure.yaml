apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/beka-birhanu/yetbota.git
    targetRevision: HEAD
    path: infra/infrastructure
  destination:
    server: https://kubernetes.default.svc
    namespace: yetbota-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
