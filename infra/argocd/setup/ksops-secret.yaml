# Create this secret on the cluster BEFORE applying the root app.
# It holds the age private key used by ksops in the ArgoCD repo-server.
#
# Steps:
#   1. Generate age key: age-keygen -o age.key
#   2. Copy public key to infra/secrets/public-age-keys.txt and infra/.sops.yaml
#   3. Run: kubectl create secret generic ksops-age-key \
#             --namespace argocd \
#             --from-file=key.txt=age.key
#   4. Delete age.key from disk after storing it securely elsewhere.
#
# The patch below mounts the key and sets SOPS_AGE_KEY_FILE on the repo-server.
# Apply with: kubectl apply -f infra/argocd/setup/repo-server-patch.yaml
