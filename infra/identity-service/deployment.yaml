apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: yetbota
  labels:
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/part-of: yetbota
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-service
        app.kubernetes.io/part-of: yetbota
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: identity-service
          image: romareo/identity-service:v0.0.9
          ports:
            - name: grpc
              containerPort: 6969
              protocol: TCP
            - name: rest
              containerPort: 6699
              protocol: TCP
          envFrom:
            - secretRef:
                name: identity-service-secret
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: rest
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 80m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
