apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: yetbota
  labels:
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/part-of: yetbota
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: identity-service
  ports:
    - name: grpc
      port: 6969
      targetPort: grpc
      protocol: TCP
    - name: rest
      port: 6699
      targetPort: rest
      protocol: TCP
