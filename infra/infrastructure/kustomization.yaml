apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - postgres/pvc.yaml
  - postgres/deployment.yaml
  - postgres/service.yaml
  - redis/pvc.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - neo4j/pvc.yaml
  - neo4j/deployment.yaml
  - neo4j/service.yaml
  - weaviate/pvc.yaml
  - weaviate/deployment.yaml
  - weaviate/service.yaml

generators:
  - postgres/secret-generator.yaml
  - redis/secret-generator.yaml
  - neo4j/secret-generator.yaml
  - weaviate/secret-generator.yaml
