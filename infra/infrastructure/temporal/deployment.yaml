apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: yetbota-infra
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/part-of: yetbota
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/part-of: yetbota
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:latest
          ports:
            - name: grpc
              containerPort: 7233
              protocol: TCP
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_SEEDS
              value: postgres
            - name: SKIP_DB_CREATE
              value: "false"
            - name: SKIP_DEFAULT_NAMESPACE_CREATION
              value: "false"
          envFrom:
            - secretRef:
                name: temporal-secret
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/temporal
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: temporal-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: yetbota-infra
  labels:
    app.kubernetes.io/name: temporal-ui
    app.kubernetes.io/part-of: yetbota
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-ui
        app.kubernetes.io/part-of: yetbota
    spec:
      enableServiceLinks: false
      containers:
        - name: temporal-ui
          image: temporalio/ui:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
