apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: yetbota-infra
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/part-of: yetbota
spec:
  selector:
    app.kubernetes.io/name: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: grpc
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: yetbota-infra
  labels:
    app.kubernetes.io/name: temporal-ui
    app.kubernetes.io/part-of: yetbota
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: temporal-ui
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
